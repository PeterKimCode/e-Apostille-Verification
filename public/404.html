<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex">
    <title>Redirecting...</title>
    <script>
      // Robust redirect: convert deep URLs like /verify/123 to /#/verify/123
      (function () {
        try {
          var pathname = window.location.pathname || '/';
          var search = window.location.search || '';
          var hash = window.location.hash || '';

          // If the URL already contains a hash route, do nothing
          if (pathname.indexOf('/#/') === 0 || hash.indexOf('#/') === 0) return;

          // Build new URL with hash preserving path + search + hash
          var origin = window.location.origin || (window.location.protocol + '//' + window.location.host);
          var newUrl = origin.replace(/\/$/, '') + '/#' + pathname + search + hash;

          // Redirect using replace so 404 stays out of history
          window.location.replace(newUrl);
        } catch (e) {
          // Fallback: go to site root
          try { window.location.replace('/'); } catch (ee) { /* noop */ }
        }
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
